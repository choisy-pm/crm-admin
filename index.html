<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Admin - 운영 관리</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', Roboto, sans-serif;
      color: #1e293b;
      background: #fafafa;
      overflow: hidden;
      height: 100vh;
    }

    /* === GNB === */
    .gnb {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      position: relative;
      z-index: 100;
    }
    .gnb-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14.5px;
      color: #1e293b;
      margin-right: 18px;
      user-select: none;
    }
    .gnb-logo-box {
      background: #2563eb;
      color: #ffffff;
      font-weight: 800;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .gnb-hamburger {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      color: #525252;
      margin-right: 12px;
    }
    .gnb-hamburger:hover { background: #f3f4f6; }

    .gnb-menu {
      display: flex;
      gap: 4px;
      flex: 1;
      align-items: center;
    }
    .gnb-menu-item {
      font-size: 13.5px;
      color: #525252;
      font-weight: 500;
      padding: 8px 14px;
      cursor: pointer;
      position: relative;
      border-radius: 4px;
      user-select: none;
      transition: color 0.12s, background 0.12s;
    }
    .gnb-menu-item:hover {
      color: #1e293b;
      background: #f5f5f5;
    }
    .gnb-menu-item.active {
      color: #1e293b;
      font-weight: 600;
    }
    .gnb-menu-item.has-dropdown {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .gnb-menu-item.has-dropdown::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 3.5px solid transparent;
      border-right: 3.5px solid transparent;
      border-top: 4px solid currentColor;
      margin-left: 3px;
      opacity: 0.5;
    }

    .gnb-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      min-width: 180px;
      display: none;
      z-index: 200;
      padding: 6px;
    }
    .gnb-menu-item.has-dropdown:hover .gnb-dropdown,
    .gnb-menu-item.has-dropdown.open .gnb-dropdown {
      display: block;
    }
    .gnb-dropdown-item {
      padding: 9px 12px;
      font-size: 13px;
      color: #525252;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 500;
      user-select: none;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .gnb-dropdown-item:hover {
      background: #f3f4f6;
      color: #1e293b;
    }
    .gnb-dropdown-item.active {
      background: #eff6ff;
      color: #2563eb;
      font-weight: 600;
    }

    .gnb-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .gnb-icon-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      color: #737373;
      transition: background 0.12s, color 0.12s;
    }
    .gnb-icon-btn:hover {
      background: #f3f4f6;
      color: #1e293b;
    }
    .gnb-user-chip {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #2563eb;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-left: 4px;
      user-select: none;
    }

    /* === Content frame === */
    .content-wrap {
      position: relative;
      width: 100vw;
      height: calc(100vh - 56px);
    }
    .page-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #fafafa;
    }
    .page-frame.active {
      display: block;
    }

    /* Loading */
    .global-loading {
      position: absolute;
      inset: 0;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #737373;
      z-index: 10;
    }
    .global-loading.hidden { display: none; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="gnb">
    <div class="gnb-logo">
      <span class="gnb-logo-box">ㅇㅈㄷ</span>
      <span>CRM Admin</span>
    </div>

    <div class="gnb-hamburger" title="메뉴">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>

    <nav class="gnb-menu">
      <div class="gnb-menu-item">업체관리</div>
      <div class="gnb-menu-item active has-dropdown" id="menu-admin">
        운영관리
        <div class="gnb-dropdown">
          <div class="gnb-dropdown-item active" data-page="hold">보류이력 설정</div>
          <div class="gnb-dropdown-item" data-page="pending">대기이력 설정</div>
          <div class="gnb-dropdown-item" data-page="general">일반이력 설정</div>
        </div>
      </div>
      <div class="gnb-menu-item">시스템 관리</div>
      <div class="gnb-menu-item">어드민 운영</div>
      <div class="gnb-menu-item has-dropdown" id="menu-biztunnel">
        비즈터널 운영
        <div class="gnb-dropdown">
          <div class="gnb-dropdown-item" data-page="sendResult">발송 결과 조회</div>
        </div>
      </div>
    </nav>

    <div class="gnb-right">
      <div class="gnb-icon-btn" title="즐겨찾기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <div class="gnb-icon-btn" title="알림">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="gnb-user-chip" title="최세영">최</div>
    </div>
  </header>

  <div class="content-wrap">
    <div class="global-loading" id="initial-loading">
      <div class="spinner"></div>
      <span>페이지 로드 중...</span>
    </div>
    <iframe id="frame-hold" class="page-frame active" title="보류이력 설정"></iframe>
    <iframe id="frame-pending" class="page-frame" title="대기이력 설정"></iframe>
    <iframe id="frame-general" class="page-frame" title="일반이력 설정"></iframe>
    <iframe id="frame-sendResult" class="page-frame" title="발송 결과 조회"></iframe>
  </div>

  <script>
    // Base64 → UTF-8 디코딩
    function b64ToUtf8(b64) {
      const bytes = Uint8Array.from(atob(b64.trim()), c => c.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    }

    const PAGES = {
      hold:       { frame: 'frame-hold',       html: null, loaded: false, b64Id: 'page-hold-b64' },
      pending:    { frame: 'frame-pending',    html: null, loaded: false, b64Id: 'page-pending-b64' },
      general:    { frame: 'frame-general',    html: null, loaded: false, b64Id: 'page-general-b64' },
      sendResult: { frame: 'frame-sendResult', html: null, loaded: false, b64Id: 'page-send-result-b64' }
    };

    function getPageHTML(name) {
      const p = PAGES[name];
      if (!p.html) {
        const b64 = document.getElementById(p.b64Id).textContent;
        p.html = b64ToUtf8(b64);
      }
      return p.html;
    }

    function loadPage(name) {
      const p = PAGES[name];
      if (p.loaded) return;
      const frame = document.getElementById(p.frame);
      frame.srcdoc = getPageHTML(name);
      p.loaded = true;
    }

    function showPage(name) {
      // iframe display 토글
      Object.entries(PAGES).forEach(([k, p]) => {
        const fr = document.getElementById(p.frame);
        fr.classList.toggle('active', k === name);
      });
      // 처음 보는 페이지면 lazy load
      loadPage(name);
      // dropdown 활성 상태 갱신
      document.querySelectorAll('.gnb-dropdown-item').forEach(it => {
        it.classList.toggle('active', it.dataset.page === name);
      });
    }

    // 초기 로드: 보류이력
    document.addEventListener('DOMContentLoaded', () => {
      loadPage('hold');
      // 로딩 인디케이터 숨김 (iframe srcdoc 로드 후)
      document.getElementById('frame-hold').addEventListener('load', () => {
        document.getElementById('initial-loading').classList.add('hidden');
      }, { once: true });
    });

    // dropdown 클릭
    document.querySelectorAll('.gnb-dropdown-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const page = e.currentTarget.dataset.page;
        if (!page || !PAGES[page]) return;
        if (e.currentTarget.classList.contains('active')) return;
        showPage(page);
        // dropdown 닫기 (클릭된 항목의 상위 menu 닫기)
        const parentMenu = e.currentTarget.closest('.gnb-menu-item');
        if (parentMenu) {
          parentMenu.classList.remove('open');
          parentMenu.style.pointerEvents = 'none';
          setTimeout(() => { parentMenu.style.pointerEvents = ''; }, 150);
        }
      });
    });

    // dropdown 메뉴 클릭 토글 (운영관리 + 비즈터널 운영)
    const dropdownMenus = ['menu-admin', 'menu-biztunnel'];
    dropdownMenus.forEach(menuId => {
      const menu = document.getElementById(menuId);
      if (!menu) return;
      menu.addEventListener('click', (e) => {
        if (e.target.closest('.gnb-dropdown-item')) return;
        dropdownMenus.forEach(otherId => {
          if (otherId !== menuId) {
            const other = document.getElementById(otherId);
            if (other) other.classList.remove('open');
          }
        });
        menu.classList.toggle('open');
      });
    });
    document.addEventListener('click', (e) => {
      dropdownMenus.forEach(menuId => {
        const menu = document.getElementById(menuId);
        if (menu && !e.target.closest('#' + menuId)) {
          menu.classList.remove('open');
        }
      });
    });
  </script>
